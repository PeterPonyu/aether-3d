name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install lint/type dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Ruff (enforced)
      run: ruff check .

    - name: Mypy strict (enforced)
      # The strict-mypy paydown (issue #62) is complete: the whole src/aether_3d
      # package is strict-clean, so mypy is now a hard, blocking gate. Any new
      # typing error fails CI to keep the package strict-clean going forward.
      run: mypy src/aether_3d

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install package and test dependencies
      run: |
        python -m pip install --upgrade pip
        # Install without napari[all] in CI environment to avoid heavy GUI dependencies
        pip install -e ".[dev]"
        pip install plotly pyvista

    - name: Run tests
      run: |
        pytest

    - name: Run bounded synthetic E2E smoke
      run: |
        python scripts/e2e/verify_aether_pipeline.py
